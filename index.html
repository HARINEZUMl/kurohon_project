<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第５管制業務処理規程</title>
<style>
:root {
  --navy:#1a2744;--navy-mid:#2c3e5e;--navy-lt:#3d537a;
  --amber:#e8a020;--amber-lt:#f5c060;
  --cream:#f7f5f0;--grey:#8a95a3;--line:#d8dde5;--white:#ffffff;
  --font:"Yu Gothic","游ゴシック","Hiragino Kaku Gothic ProN",sans-serif;
  --mono:"Courier New",monospace;
  --r:4px;--shadow:0 2px 12px rgba(26,39,68,.15);--tr:220ms ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--cream);color:var(--navy);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* ローディング */
#ls{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
#ls h2{color:var(--white);font-size:16px;}
#ls p{color:var(--grey);font-size:13px;}
.sp{width:40px;height:40px;border:3px solid var(--navy-lt);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#lp{color:var(--amber-lt);font-size:12px;font-family:var(--mono);}

/* ヘッダー */
header{background:var(--navy);color:var(--white);padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:2px solid var(--amber);}
header h1{font-size:13px;font-weight:700;letter-spacing:.05em;white-space:nowrap;}
.sb{flex:1;display:flex;gap:6px;max-width:500px;}
.sb input{flex:1;padding:6px 10px;border:1px solid var(--navy-lt);border-radius:var(--r);background:var(--navy-mid);color:var(--white);font-size:13px;outline:none;font-family:var(--font);}
.sb input::placeholder{color:var(--grey);}
.sb input:focus{border-color:var(--amber);}
.sb button{padding:6px 14px;background:var(--amber);color:var(--navy);border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;}
.sb button:hover{background:var(--amber-lt);}
.ntabs{display:flex;gap:4px;margin-left:auto;}
.nb{padding:5px 12px;background:transparent;color:var(--grey);border:1px solid var(--navy-lt);border-radius:var(--r);font-size:12px;cursor:pointer;transition:var(--tr);white-space:nowrap;}
.nb.active,.nb:hover{background:var(--navy-lt);color:var(--white);border-color:var(--amber);}

/* レイアウト */
.body{display:flex;flex:1;overflow:hidden;}

/* サイドバー */
.side{width:240px;background:var(--white);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.side-h{padding:8px 12px;font-size:11px;font-weight:700;color:var(--grey);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--line);background:var(--cream);}
.tree{flex:1;overflow-y:auto;padding:4px 0;}
.ti{padding:5px 12px;font-size:12px;cursor:pointer;line-height:1.4;border-left:3px solid transparent;transition:background var(--tr);}
.ti:hover{background:var(--cream);}
.ti.active{background:#eef2f8;border-left-color:var(--amber);font-weight:700;}
.ti.lv1{font-weight:700;color:var(--navy);}
.ti.lv2{padding-left:20px;color:var(--navy-mid);}
.ti.lv3{padding-left:28px;color:var(--navy-lt);font-size:11px;}
.tbadge{font-size:10px;padding:1px 4px;border-radius:8px;background:var(--line);color:var(--grey);margin-left:4px;font-family:var(--mono);}

/* メイン */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.tp{display:none;flex:1;overflow:hidden;flex-direction:column;}
.tp.active{display:flex;}

/* 検索結果 */
.ra{flex:1;overflow-y:auto;padding:14px 16px;}
.rh{font-size:12px;color:var(--grey);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.rc{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:box-shadow var(--tr),border-color var(--tr);}
.rc:hover{box-shadow:var(--shadow);border-color:var(--amber);}
.rm{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
.rk{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:700;}
.rk-H1,.rk-H2{background:#e8f0fe;color:#1a56db;}
.rk-H3{background:#fef3c7;color:#92400e;}
.rk-DEF{background:#d1fae5;color:#065f46;}
.rk-H4,.rk-H5{background:#f3f4f6;color:#374151;}
.rk-BOX_TITLE{background:#ede9fe;color:#5b21b6;}
.rp{font-size:10px;color:var(--grey);font-family:var(--mono);}
.rbc{font-size:11px;color:var(--grey);margin-bottom:3px;}
.rt{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px;}
.rs{font-size:12px;color:#555;line-height:1.6;white-space:pre-wrap;}
.rs mark{background:#fef08a;color:var(--navy);border-radius:2px;padding:0 2px;}

/* セクション表示 */
.sv{flex:1;overflow-y:auto;padding:16px;}
.sv-back{font-size:12px;color:var(--grey);background:none;border:none;cursor:pointer;margin-bottom:10px;display:block;}
.sv-card{background:var(--white);border:1px solid var(--amber);border-radius:var(--r);padding:16px;}
.sv-title{font-size:15px;font-weight:700;margin-bottom:10px;}
.sv-body{font-size:13px;line-height:1.9;white-space:pre-wrap;color:#333;}
.brace-group{position:relative;margin:6px 0 6px 4px;padding:6px 10px;border-left:3px solid var(--amber,#c99a3c);background:rgba(201,154,60,.06);border-radius:0 4px 4px 0;}
.brace-group::before{content:"代替表現";position:absolute;top:-9px;left:8px;font-size:10px;color:var(--amber,#c99a3c);background:var(--white,#fff);padding:0 4px;}

/* PDFページビューア */
.pdf-viewer{margin-top:16px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:#525659;}
.pdf-viewer-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--navy-mid);color:var(--white);}
.pdf-viewer-header span{font-size:12px;}
.pdf-viewer-nav{display:flex;align-items:center;gap:8px;}
.pdf-viewer-nav button{background:var(--navy-lt);color:var(--white);border:none;border-radius:var(--r);padding:4px 10px;font-size:12px;cursor:pointer;}
.pdf-viewer-nav button:hover{background:var(--amber);color:var(--navy);}
.pdf-viewer-nav input{width:48px;padding:3px 6px;border:1px solid var(--navy-lt);border-radius:var(--r);background:var(--navy-mid);color:var(--white);font-size:12px;text-align:center;}
.pdf-canvas-wrap{overflow:auto;max-height:600px;display:flex;justify-content:center;padding:8px;background:#525659;}
.pdf-canvas-wrap canvas{max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.4);}
.pdf-loading{padding:40px;text-align:center;color:#ccc;font-size:13px;}
.rl{color:#1a56db;text-decoration:underline;cursor:pointer;background:#e8f0fe;border-radius:2px;padding:0 2px;}

/* 定義 */
.db{padding:10px 14px;border-bottom:1px solid var(--line);background:var(--white);}
.db input{width:100%;padding:6px 10px;border:1px solid var(--line);border-radius:var(--r);font-size:13px;outline:none;font-family:var(--font);}
.db input:focus{border-color:var(--amber);}
.dl{flex:1;overflow-y:auto;}
.di{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line);transition:background var(--tr);}
.di:hover{background:#f0f4ff;}
.dt{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.dd{font-size:11px;color:#666;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* 参照パネル */
.rp-panel{position:absolute;top:0;right:0;bottom:0;width:0;background:var(--white);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;transition:width 280ms cubic-bezier(.4,0,.2,1);z-index:10;}
.rp-panel.open{width:min(360px,90vw);box-shadow:var(--shadow);}
.rp-h{padding:10px 14px;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rp-title{font-size:12px;font-weight:700;}
.rp-x{background:none;border:none;color:var(--grey);font-size:20px;cursor:pointer;line-height:1;}
.rp-x:hover{color:var(--white);}
.rp-org{padding:8px 12px;background:#fffbeb;border-bottom:2px solid var(--amber);font-size:11px;color:#92400e;line-height:1.5;flex-shrink:0;}
.rp-org strong{display:block;font-size:12px;margin-bottom:2px;}
.rp-body{flex:1;overflow-y:auto;padding:10px 12px;}
.rsec{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line);cursor:pointer;}
.rsec:hover{background:#f8faff;border-radius:var(--r);}
.rsec:last-child{border-bottom:none;}
.rsec-lbl{font-size:10px;font-weight:700;color:var(--grey);letter-spacing:.08em;margin-bottom:4px;}
.rsec-bc{font-size:10px;color:var(--grey);margin-bottom:3px;}
.rsec-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.rsec-text{font-size:12px;color:#444;line-height:1.7;white-space:pre-wrap;}
.rsec-page{font-size:10px;color:var(--grey);font-family:var(--mono);margin-top:3px;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;color:var(--grey);font-size:13px;gap:8px;}
.ei{font-size:30px;opacity:.4;}
.li{padding:30px;text-align:center;color:var(--grey);font-size:13px;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}

/* PDFパネル */
.pdf-panel{width:0;background:var(--white);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;transition:width 300ms cubic-bezier(.4,0,.2,1);flex-shrink:0;}
.pdf-panel.open{width:420px;}
.pdf-ph{padding:10px 14px;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.pdf-ph-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdf-nav-btn{background:var(--navy-lt);border:none;color:var(--white);padding:3px 8px;border-radius:3px;cursor:pointer;font-size:12px;}
.pdf-nav-btn:hover{background:var(--amber);color:var(--navy);}
.pdf-body{flex:1;overflow-y:auto;padding:8px;}
.pdf-loading{padding:40px;text-align:center;color:var(--grey);font-size:12px;}
@media(max-width:640px){.side{display:none;}header h1{display:none;}.rp-panel.open{width:100vw;}.pdf-panel.open{width:100vw;}}

/* PDFビューア */
.pdf-viewer{margin-top:16px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:#525659;}
.pdf-viewer-header{padding:8px 12px;background:var(--navy-mid);color:var(--white);display:flex;align-items:center;justify-content:space-between;font-size:12px;}
.pdf-viewer-controls{display:flex;align-items:center;gap:8px;}
.pdf-nav-btn{background:var(--navy-lt);color:var(--white);border:none;border-radius:var(--r);padding:3px 10px;cursor:pointer;font-size:12px;}
.pdf-nav-btn:hover{background:var(--amber);color:var(--navy);}
.pdf-canvas-wrap{overflow:auto;max-height:600px;display:flex;justify-content:center;padding:8px;}
.pdf-canvas-wrap canvas{box-shadow:0 2px 8px rgba(0,0,0,.4);}
</style>
</head>
<body>

<div id="ls">
  <div class="sp"></div>
  <h2>第５管制業務処理規程</h2>
  <p>インデックスを読み込んでいます</p>
  <div id="lp"></div>
</div>

<header>
  <h1>第５管制業務処理規程</h1>
  <div class="sb">
    <input type="text" id="si" placeholder="キーワードを入力…" />
    <button onclick="doSearch()">検索</button>
  </div>
  <div class="ntabs">
    <button class="nb active" id="btn-search" onclick="switchTab('search',this)">検索</button>
    <button class="nb" id="btn-def" onclick="switchTab('def',this)">定義</button>
  </div>
</header>

<div class="body">
  <aside class="side">
    <div class="side-h">目次</div>
    <div class="tree" id="tree"></div>
  </aside>
  <main class="main">
    <div class="tp active" id="panel-search">
      <div class="ra" id="ra">
        <div class="empty"><div class="ei">🔍</div><div>キーワードで検索してください</div></div>
      </div>
    </div>
    <div class="tp" id="panel-def">
      <div class="db"><input type="text" id="di" placeholder="用語を検索…" oninput="filterDefs(this.value)"/></div>
      <div class="dl" id="dl"><div class="li">読み込み中…</div></div>
    </div>
    <aside class="rp-panel" id="rpp">
      <div class="rp-h">
        <span class="rp-title">📎 参照先</span>
        <button class="rp-x" onclick="closeRef()">×</button>
      </div>
      <div class="rp-org" id="rpo"></div>
      <div class="rp-body" id="rpb"></div>
    </aside>

    <!-- PDFビューアパネル（右側） -->
    <aside class="pdf-panel" id="pdf-panel">
      <div class="pdf-ph">
        <span class="pdf-ph-title">📄 <span id="pdf-panel-label"></span></span>
        <div style="display:flex;align-items:center;gap:6px">
          <button class="pdf-nav-btn" onclick="pdfGo(-1)">◀</button>
          <input type="number" id="pdf-page-input" min="1" style="width:50px;padding:3px 6px;border:1px solid var(--navy-lt);border-radius:3px;background:var(--navy-mid);color:var(--white);font-size:12px;text-align:center" onchange="pdfJump()" />
          <button class="pdf-nav-btn" onclick="pdfGo(1)">▶</button>
          <button class="rp-x" onclick="closePdfPanel()">×</button>
        </div>
      </div>
      <div class="pdf-body">
        <div id="pdf-canvas-wrap-main-pdf" style="width:100%">
          <div class="pdf-loading">セクションを選択するとPDFが表示されます</div>
        </div>
      </div>
    </aside>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
const DB_URL  = 'data/index.db?v=' + Date.now();
const PDF_URL = 'pdfs/航空保安業務処理規定第五管制業務処理規定.pdf';

// PDF.js設定
let pdfDoc     = null;
let pdfLoading = false;

async function ensurePdf() {
  if (pdfDoc) return pdfDoc;
  if (pdfLoading) {
    // ロード中なら待つ
    while (pdfLoading) await new Promise(r => setTimeout(r, 100));
    return pdfDoc;
  }
  pdfLoading = true;
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
  } finally {
    pdfLoading = false;
  }
  return pdfDoc;
}

async function renderPdfPage(canvasId, pageNum) {
  const wrap = document.getElementById('pdf-canvas-wrap-' + canvasId);
  if (!wrap) return;
  wrap.innerHTML = '<div class="pdf-loading">ページを読み込み中…</div>';

  try {
    const doc = await ensurePdf();
    if (pageNum < 1 || pageNum > doc.numPages) {
      wrap.innerHTML = '<div class="pdf-loading">ページが見つかりません</div>';
      return;
    }
    const page     = await doc.getPage(pageNum);
    const viewport = page.getViewport({ scale: 1.4 });
    const canvas   = document.createElement('canvas');
    canvas.width   = viewport.width;
    canvas.height  = viewport.height;
    canvas.style.width  = '100%';
    canvas.style.height = 'auto';
    wrap.innerHTML = '';
    wrap.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  } catch(e) {
    wrap.innerHTML = `<div class="pdf-loading">表示エラー: ${esc(e.message)}</div>`;
  }
}

function openPdfPanel(physPage, label) {
  const panel   = document.getElementById('pdf-panel');
  const panelLbl = document.getElementById('pdf-panel-label');
  const cid     = 'main-pdf';

  panelLbl.textContent = label || 'p' + physPage;
  panel.classList.add('open');

  // ページ入力欄を更新
  const input = document.getElementById('pdf-page-input');
  if (input) input.value = physPage;

  // レンダリング
  renderPdfPage(cid, physPage);
}

function closePdfPanel() {
  document.getElementById('pdf-panel').classList.remove('open');
}

function pdfGo(delta) {
  const input = document.getElementById('pdf-page-input');
  if (!input) return;
  const newPage = Math.max(1, parseInt(input.value||1) + delta);
  input.value = newPage;
  renderPdfPage('main-pdf', newPage);
}

function pdfJump() {
  const input = document.getElementById('pdf-page-input');
  if (!input) return;
  renderPdfPage('main-pdf', parseInt(input.value||1));
}
let DB = null;
let ALL = [];       // 全セクションキャッシュ
let DEFS = [];      // 定義語キャッシュ
let SR = [];        // 検索結果キャッシュ

// ── 初期化 ──────────────────────────────────────────
async function init() {
  const lp = document.getElementById('lp');
  try {
    lp.textContent = 'sql.js を初期化中…';
    const SQL = await initSqlJs({
      locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
    });
    lp.textContent = 'DBを取得中…';
    const res = await fetch(DB_URL);
    if (!res.ok) throw new Error('DB取得失敗: ' + res.status);
    const buf = await res.arrayBuffer();
    lp.textContent = 'DBを展開中…';
    DB = new SQL.Database(new Uint8Array(buf));
    lp.textContent = 'セクションを読み込み中…';

    // 全セクションをメモリに展開（FTS5は使わずJS側で検索）
    const stmt = DB.prepare('SELECT id,kind,title,text,physical_page,doc_page_id,parent_h1,parent_h2,parent_h3 FROM sections ORDER BY id');
    while (stmt.step()) ALL.push(stmt.getAsObject());
    stmt.free();
    console.log('セクション数:', ALL.length);

    lp.textContent = '目次を構築中…';
    buildTree();
    buildDefs();
    document.getElementById('ls').style.display = 'none';
  } catch(e) {
    console.error(e);
    document.getElementById('ls').innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:30px;margin-bottom:12px">⚠️</div>
        <div style="color:white;margin-bottom:8px">読み込みに失敗しました</div>
        <div style="color:#8a95a3;font-size:12px">${e.message}</div>
      </div>`;
  }
}

// ── DB直接クエリ（参照テーブルのみ使用） ──────────────
function dbQuery(sql, params=[]) {
  try {
    const stmt = DB.prepare(sql);
    stmt.bind(params);
    const rows = [];
    while (stmt.step()) rows.push(stmt.getAsObject());
    stmt.free();
    return rows;
  } catch(e) {
    console.error('SQL error:', e.message);
    return [];
  }
}

// ── 目次ツリー ──────────────────────────────────────
function buildTree() {
  const h1s = ALL.filter(s => s.kind === 'H1');
  const h2s = ALL.filter(s => s.kind === 'H2');
  const h3s = ALL.filter(s => s.kind === 'H3');
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  // 日本語を含まないH3は除外（書類様式ページの英数字誤登録対策）
  // また様式記入例ページの項目（管理管制日誌、飛行場管制所機器点検表など）も除外
  const EXCLUDE_PATTERN = /^(管理管制日誌|飛行場管制所機器点検表|㊙|航空交通管制特別報告書$)/;
  const validH3s = h3s.filter(s =>
    /[\u3000-\u9fff\uff00-\uffef\u3040-\u30ff]/.test(s.title) &&
    !EXCLUDE_PATTERN.test(s.title)
  );

  for (let i = 0; i < h1s.length; i++) {
    const h1   = h1s[i];
    const next = h1s[i + 1];
    tree.appendChild(mkTi(h1, 'lv1'));

    // このH1範囲のH2を取得
    const rangeH2s = h2s.filter(s =>
      Number(s.id) > Number(h1.id) &&
      (!next || Number(s.id) < Number(next.id))
    );

    if (rangeH2s.length) {
      // H2がある場合：H2→H3の順で表示
      for (const h2 of rangeH2s) {
        tree.appendChild(mkTi(h2, 'lv2'));
        const seen = new Set();
        for (const h3 of validH3s.filter(x =>
          x.parent_h2 === h2.title &&
          x.parent_h1 === h2.parent_h1
        )) {
          if (seen.has(h3.title)) continue;
          seen.add(h3.title);
          tree.appendChild(mkTi(h3, 'lv3'));
        }
      }
    } else {
      // H2がない場合：このH1範囲のH3を直接表示
      // Ⅰ総則（最初のH1）の場合はorphanH3（parent_h2が空）も含める
      const isFirstH1 = i === 0;
      const rangeH3s = validH3s.filter(s => {
        const inRange = Number(s.id) > Number(h1.id) &&
          (!next || Number(s.id) < Number(next.id));
        // Ⅰ総則の場合はorphanH3（parent_h2が空かつh1s[1]より前）も含める
        const nextH1id = h1s[1] ? Number(h1s[1].id) : Infinity;
        const isOrphan = isFirstH1 && !s.parent_h2 && Number(s.id) < nextH1id;
        return inRange || isOrphan;
      });
      const seen = new Set();
      for (const h3 of rangeH3s.sort((a,b) => Number(a.id)-Number(b.id))) {
        if (seen.has(h3.title)) continue;
        seen.add(h3.title);
        const iDef = h3.title === '２定義';
        const disp = iDef ? {...h3, title:'２定義【定義一覧】'} : h3;
        if (iDef) {
          tree.appendChild(mkTiVirtual(disp, 'lv2', () => showDefinitions()));
        } else {
          tree.appendChild(mkTi(h3, 'lv2'));
        }
      }
    }
  }
}

function mkTiVirtual(sec, lv, onClick) {

}

// ── タブ切替 ─────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tp').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── 検索（JS内文字列検索） ───────────────────────────
document.getElementById('si').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });

function doSearch() {
  const q = document.getElementById('si').value.trim();
  if (!q) return;
  switchTab('search', document.getElementById('btn-search'));
  const ra = document.getElementById('ra');
  ra.innerHTML = '<div class="li">検索中…</div>';

  const ql = q.toLowerCase();
  const matched = ALL.filter(s =>
    (s.title||'').toLowerCase().includes(ql) ||
    (s.text||'').toLowerCase().includes(ql)
  ).slice(0, 50);
  SR = matched;

  if (!matched.length) {
    ra.innerHTML = '<div class="empty"><div class="ei">📭</div><div>該当する項目が見つかりませんでした</div></div>';
    return;
  }
  ra.innerHTML = `<div class="rh">${matched.length}件 ヒット</div>`;
  for (const r of matched) ra.appendChild(mkCard(r, q));
}

function mkCard(s, q) {
  const el = document.createElement('div');
  el.className = 'rc';
  el.addEventListener('click', () => showSection(s.id));
  const bc = [s.parent_h1, s.parent_h2, s.parent_h3].filter(Boolean).join(' › ');
  const snip = mkSnip(s.text, q) || mkSnip(s.title, q);
  el.innerHTML = `
    <div class="rm">
      <span class="rk rk-${s.kind}">${kl(s.kind)}</span>
      <span class="rp">${esc(s.doc_page_id||'p'+s.physical_page)}</span>
    </div>
    ${bc?`<div class="rbc">${esc(bc)}</div>`:''}
    <div class="rt">${esc(s.title||'（本文）')}</div>
    ${snip?`<div class="rs">${snip}</div>`:''}
  `;
  return el;
}

function mkSnip(text, q, ctx=40) {
  if (!text||!q) return '';
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return '';
  const s = Math.max(0, i-ctx), e = Math.min(text.length, i+q.length+ctx);
  const part = esc(text.slice(s, e));
  const eq = esc(text.slice(i, i+q.length));
  return (s>0?'…':'') + part.replace(eq, `<mark>${eq}</mark>`) + (e<text.length?'…':'');
}

// ── セクション詳細 ──────────────────────────────────
function showSection(id) {
  const sid = Number(id);
  const sec = ALL.find(s => Number(s.id) === sid);
  if (!sec) {
    console.error('セクションが見つかりません id=', id);
    return;
  }

  switchTab('search', document.getElementById('btn-search'));
  const ra = document.getElementById('ra');

  // H3でtextがある場合は直接本文表示
  if (sec.kind === 'H3' && sec.text) {
    const refs = dbQuery('SELECT * FROM references_table WHERE from_block_id=?', [sid]);
    let body = esc(sec.text || '');
    for (const ref of refs) {
      const er = esc(ref.ref_text).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      body = body.replace(new RegExp(er,'g'), `<span class="rl" data-ref="${esc(ref.ref_text)}">${esc(ref.ref_text)}</span>`);
    }
    body = wrapBraceGroups(body);
    const bc = [sec.parent_h1, sec.parent_h2, sec.parent_h3].filter(Boolean).join(' › ');
    ra.innerHTML = `
      <div class="sv">
        <button class="sv-back" onclick="restoreSR()">← 検索結果に戻る</button>
        <div class="sv-card">
          <div class="rm" style="margin-bottom:6px">
            <span class="rk rk-${sec.kind}">${kl(sec.kind)}</span>
            <span class="rp">${esc(sec.doc_page_id||'p'+sec.physical_page)}</span>
          </div>
          ${bc?`<div class="rbc" style="margin-bottom:6px">${esc(bc)}</div>`:''}
          <div class="sv-title">${esc(sec.title||'')}</div>
          <div class="sv-body">${body}</div>
        </div>
      </div>
    `;
    ra.querySelectorAll('.rl').forEach(el => {
      el.addEventListener('click', () => openRef(el.dataset.ref));
    });
    return;
  }

  // H1/H2/H3は本文を持たないので配下のブロックをまとめて表示
  if (['H1','H2','H3'].includes(sec.kind)) {
    showSectionGroup(sec, ra);
    return;
  }

  // H4/H5/DEF/BODYは本文を直接表示
  const refs = dbQuery('SELECT * FROM references_table WHERE from_block_id=?', [sid]);
  let body = esc(sec.text || '');
  for (const ref of refs) {
    const er = esc(ref.ref_text).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    body = body.replace(new RegExp(er,'g'), `<span class="rl" data-ref="${esc(ref.ref_text)}">${esc(ref.ref_text)}</span>`);
  }
  body = wrapBraceGroups(body);
  const bc = [sec.parent_h1, sec.parent_h2, sec.parent_h3].filter(Boolean).join(' › ');

  ra.innerHTML = `
    <div class="sv">
      <button class="sv-back" onclick="restoreSR()">← 検索結果に戻る</button>
      <div class="sv-card">
        <div class="rm" style="margin-bottom:6px">
          <span class="rk rk-${sec.kind}">${kl(sec.kind)}</span>
          <span class="rp">${esc(sec.doc_page_id||'p'+sec.physical_page)}</span>
        </div>
        ${bc?`<div class="rbc" style="margin-bottom:6px">${esc(bc)}</div>`:''}
        <div class="sv-title">${esc(sec.title||'')}</div>
        <div class="sv-body">${body||'<span style="color:#999">（本文なし）</span>'}</div>
      </div>
      <div id="pdf-viewer-area" style="display:none"></div>
    </div>
  `;
  ra.querySelectorAll('.rl').forEach(el => {
    el.addEventListener('click', () => openRef(el.dataset.ref));
  });
  // PDFパネルを開く
  if (sec.physical_page) openPdfPanel(sec.physical_page, sec.doc_page_id||'p'+sec.physical_page);
}

// H1/H2/H3クリック時：配下のブロックをまとめて表示
function showSectionGroup(sec, ra) {
  // 同じid以降で次の同レベル以上の見出しまでのブロックを取得
  const levelOrder = {H1:1, H2:2, H3:3, H4:4, H5:5, DEF:6, BODY:7, BOX_TITLE:8};
  const myLevel = levelOrder[sec.kind] || 9;
  const startIdx = ALL.findIndex(s => Number(s.id) === Number(sec.id));

  // 配下のブロックを収集（次の同レベル以上の見出しで終了）
  const children = [];
  for (let i = startIdx + 1; i < ALL.length; i++) {
    const s = ALL[i];
    const slevel = levelOrder[s.kind] || 9;
    if (slevel <= myLevel && ['H1','H2','H3'].includes(s.kind)) break;
    if (!['BOX_TITLE'].includes(s.kind)) children.push(s);
  }

  const bc = [sec.parent_h1, sec.parent_h2, sec.parent_h3].filter(Boolean).join(' › ');

  ra.innerHTML = '';
  const sv = document.createElement('div');
  sv.className = 'sv';
  sv.innerHTML = `
    <button class="sv-back" onclick="restoreSR()">← 検索結果に戻る</button>
    <div class="sv-card">
      <div class="rm" style="margin-bottom:6px">
        <span class="rk rk-${sec.kind}">${kl(sec.kind)}</span>
        <span class="rp">${esc(sec.doc_page_id||'p'+sec.physical_page)}</span>
      </div>
      ${bc?`<div class="rbc" style="margin-bottom:6px">${esc(bc)}</div>`:''}
      <div class="sv-title">${esc(sec.title||'')}</div>
      <div id="group-body" style="margin-top:12px"></div>
    </div>
  `;
  ra.appendChild(sv);

  const gb = document.getElementById('group-body');
  for (const child of children) {
    const refs = dbQuery('SELECT * FROM references_table WHERE from_block_id=?', [Number(child.id)]);
    let body = esc(child.text || '');
    for (const ref of refs) {
      const er = esc(ref.ref_text).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      body = body.replace(new RegExp(er,'g'), `<span class="rl" data-ref="${esc(ref.ref_text)}">${esc(ref.ref_text)}</span>`);
    }
    body = wrapBraceGroups(body);

    const block = document.createElement('div');
    block.style.cssText = 'margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line);';

    if (child.kind === 'H3') {
      // H3はタイトル表示。本文がある場合はtitle+textを連結して表示
      const refs = dbQuery('SELECT * FROM references_table WHERE from_block_id=?', [Number(child.id)]);
      let fullText = (child.title||'');
      if (child.text) fullText += '\n' + child.text;
      let fullHtml = esc(fullText);
      for (const ref of refs) {
        const er = esc(ref.ref_text).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        fullHtml = fullHtml.replace(new RegExp(er,'g'), `<span class="rl" data-ref="${esc(ref.ref_text)}">${esc(ref.ref_text)}</span>`);
      }
      fullHtml = wrapBraceGroups(fullHtml);
      block.innerHTML = `
        <div style="font-size:13px;font-weight:700;color:var(--navy);margin:10px 0 6px;border-left:3px solid var(--amber);padding-left:8px">${esc(child.title||'')}</div>
        ${child.text ? `<div class="sv-body">${fullHtml.replace(esc(child.title||''), '')}</div>` : ''}
      `;
    } else if (['H4','H5'].includes(child.kind)) {
      // H4/H5はタイトルに本文が混入しているためtitle+textを連結して表示
      const fullText = (child.title||'') + (child.text ? '\n' + child.text : '');
      let fullHtml = esc(fullText);
      for (const ref of dbQuery('SELECT * FROM references_table WHERE from_block_id=?', [Number(child.id)])) {
        const er = esc(ref.ref_text).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        fullHtml = fullHtml.replace(new RegExp(er,'g'), `<span class="rl" data-ref="${esc(ref.ref_text)}">${esc(ref.ref_text)}</span>`);
      }
      fullHtml = wrapBraceGroups(fullHtml);
      block.innerHTML = `<div class="sv-body">${fullHtml}</div>`;
    } else {
      block.innerHTML = `<div class="sv-body">${body||''}</div>`;
    }

    block.querySelectorAll('.rl').forEach(el => {
      el.addEventListener('click', () => openRef(el.dataset.ref));
    });
    gb.appendChild(block);
  }
  // PDFパネルを開く（最初のchildのページ）
  if (sec.physical_page) openPdfPanel(sec.physical_page, sec.doc_page_id||'p'+sec.physical_page);
}

function restoreSR() {
  const ra = document.getElementById('ra');
  if (!SR.length) {
    ra.innerHTML = '<div class="empty"><div class="ei">🔍</div><div>キーワードで検索してください</div></div>';
    return;
  }
  const q = document.getElementById('si').value.trim();
  ra.innerHTML = `<div class="rh">${SR.length}件 ヒット</div>`;
  for (const r of SR) ra.appendChild(mkCard(r, q));
}

// ── 参照パネル ──────────────────────────────────────
function openRef(refText) {
  const panel = document.getElementById('rpp');
  document.getElementById('rpo').innerHTML = `<strong>参照：「${esc(refText)}」</strong>候補を表示しています`;
  const body = document.getElementById('rpb');
  body.innerHTML = '<div class="li">検索中…</div>';
  panel.classList.add('open');

  const ql = refText.toLowerCase();
  const rows = ALL.filter(s =>
    (s.title||'').toLowerCase().includes(ql) ||
    (s.text||'').toLowerCase().includes(ql)
  ).slice(0, 8);

  if (!rows.length) {
    body.innerHTML = '<div class="empty"><div class="ei">📭</div><div>参照先が見つかりませんでした</div></div>';
    return;
  }
  body.innerHTML = '';
  for (const r of rows) {
    const el = document.createElement('div');
    el.className = 'rsec';
    const bc = [r.parent_h1, r.parent_h2].filter(Boolean).join(' › ');
    el.innerHTML = `
      <div class="rsec-lbl">${kl(r.kind)}</div>
      ${bc?`<div class="rsec-bc">${esc(bc)}</div>`:''}
      <div class="rsec-title">${esc(r.title||'（本文）')}</div>
      <div class="rsec-text">${esc((r.text||'').slice(0,250))}${(r.text||'').length>250?'…':''}</div>
      <div class="rsec-page">${esc(r.doc_page_id||'p'+r.physical_page)}</div>
    `;
    el.addEventListener('click', () => { closeRef(); showSection(r.id); });
    body.appendChild(el);
  }
}

function closeRef() { document.getElementById('rpp').classList.remove('open'); }

// ── 定義一覧 ─────────────────────────────────────────
function buildDefs() {
  DEFS = ALL.filter(s => s.kind === 'DEF').sort((a,b) => a.title.localeCompare(b.title,'ja'));
  renderDefs(DEFS);
}

function filterDefs(q) {
  renderDefs(q ? DEFS.filter(d => d.title.includes(q)||(d.text||'').includes(q)) : DEFS);
}

function renderDefs(defs) {
  const dl = document.getElementById('dl');
  if (!defs.length) { dl.innerHTML='<div class="empty"><div class="ei">📭</div><div>該当する用語がありません</div></div>'; return; }
  dl.innerHTML = '';
  for (const d of defs) {
    const el = document.createElement('div');
    el.className = 'di';
    el.innerHTML = `<div class="dt">${esc(d.title)}</div><div class="dd">${esc(d.text||'')}</div>`;
    el.addEventListener('click', () => showSection(d.id));
    dl.appendChild(el);
  }
}

// ── ユーティリティ ──────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// parser.pyが埋め込む｛グループマーカー(⬟...⬡)を視覚的な囲みに変換する
// ※必ずesc()適用後の文字列に対して呼び出すこと
function wrapBraceGroups(escapedHtml){
  return escapedHtml
    .replace(/\u2b1f\n?/g, '<div class="brace-group">')
    .replace(/\u2b21\n?/g, '</div>');
}
function kl(k){return {H1:'大章',H2:'章',H3:'節',H4:'小見出し',H5:'項',DEF:'定義',BOX_TITLE:'囲み'}[k]||k;}

init();
